name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: node bin/cli.js init --yes --name ci-smoke --frontend none --backend go --domain ml --target claude --output-dir /tmp/agentic-crew-smoke --force
      - run: node bin/cli.js doctor --dir /tmp/agentic-crew-smoke
